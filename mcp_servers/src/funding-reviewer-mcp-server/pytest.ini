[tool:pytest]
# Pytest configuration for POC Funding Reviewer MCP Server

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    integration: Integration tests that may be slow or require external services
    performance: Performance and load tests
    security: Security and vulnerability tests
    compliance: Compliance validation tests
    slow: Tests that take a long time to run
    unit: Unit tests (default)

# Output options
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --showlocals
    --durations=10

# Coverage options
[coverage:run]
source = awslabs.poc_funding_reviewer_mcp_server
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov