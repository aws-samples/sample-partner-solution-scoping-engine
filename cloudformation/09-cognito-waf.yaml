AWSTemplateFormatVersion: '2010-09-09'
Description: 'SERA Cognito WAF - Deploy in us-east-1 ONLY - Multi-Stack Support'

Parameters:
  StackPrefix:
    Type: String
    Description: 'Unique prefix for this SERA deployment (e.g., sera-prod, sera-dev, sera-partner1)'
    AllowedPattern: '^[a-z][a-z0-9-]{2,20}$'
    ConstraintDescription: 'Must be 3-21 characters, lowercase, start with letter, hyphens allowed'
    Default: 'sera'

Conditions:
  IsUSEast1: !Equals [!Ref 'AWS::Region', 'us-east-1']

Resources:
  # WAF Web ACL for Cognito (us-east-1 only) - With Managed Rules
  CognitoWAFWebACL:
    Type: AWS::WAFv2::WebACL
    Condition: IsUSEast1
    Metadata:
      checkov:
        skip:
          - id: CKV_AWS_192
            comment: "Log4j protection rule (AWSManagedRulesLog4jRuleSet) has been added to the WAF rules. SERA application is Python-based (not Java) so not vulnerable to Log4j, but rule added for compliance and defense-in-depth."
    Properties:
      Name: !Sub '${StackPrefix}-cognito-waf'
      Description: !Sub 'WAF for ${StackPrefix} Cognito User Pool - COUNT mode for monitoring'
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      
      Rules:
        # Rate limiting for authentication attempts (custom rule - uses Action)
        - Name: AuthenticationRateLimit
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: 100  # 100 requests per 5 minutes per IP
              AggregateKeyType: IP
              ScopeDownStatement:
                OrStatement:
                  Statements:
                    - ByteMatchStatement:
                        SearchString: '/oauth2/'
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: LOWERCASE
                        PositionalConstraint: CONTAINS
                    - ByteMatchStatement:
                        SearchString: '/login'
                        FieldToMatch:
                          UriPath: {}
                        TextTransformations:
                          - Priority: 0
                            Type: LOWERCASE
                        PositionalConstraint: CONTAINS
          Action:
            Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${StackPrefix}AuthRateLimit'

        # AWS Managed Rules - Common Rule Set (managed rule - uses OverrideAction only)
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 2
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
              ExcludedRules: []
          OverrideAction:
            Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${StackPrefix}CommonRuleSet'

        # AWS Managed Rules - Known Bad Inputs (managed rule - uses OverrideAction only)
        - Name: AWSManagedRulesKnownBadInputsRuleSet
          Priority: 3
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesKnownBadInputsRuleSet
              ExcludedRules: []
          OverrideAction:
            Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${StackPrefix}KnownBadInputs'

        # IP Reputation monitoring (managed rule - uses OverrideAction only)
        - Name: AWSManagedRulesAmazonIpReputationList
          Priority: 4
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesAmazonIpReputationList
              ExcludedRules: []
          OverrideAction:
            Count: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${StackPrefix}IpReputation'

      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${StackPrefix}-cognito-waf'
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-cognito-waf'
        - Key: Application
          Value: !Sub 'SERA-${StackPrefix}'
        - Key: StackPrefix
          Value: !Ref StackPrefix

  # CloudWatch Log Group for WAF Logs (us-east-1 only)
  WAFLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: IsUSEast1
    Properties:
      LogGroupName: !Sub 'aws-waf-logs-${StackPrefix}-cognito'
      RetentionInDays: 3653
      KmsKeyId: !ImportValue
        Fn::Sub: '${StackPrefix}-kms-key-arn'

  # WAF Logging Configuration (us-east-1 only)
  WAFLoggingConfiguration:
    Type: AWS::WAFv2::LoggingConfiguration
    Condition: IsUSEast1
    Properties:
      ResourceArn: !GetAtt CognitoWAFWebACL.Arn
      LogDestinationConfigs:
        - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:aws-waf-logs-${StackPrefix}-cognito"
      LoggingFilter:
        DefaultBehavior: KEEP
        Filters:
          - Behavior: KEEP
            Conditions:
              - ActionCondition:
                  Action: COUNT
            Requirement: MEETS_ANY

Outputs:
  WAFWebACLId:
    Description: 'ID of the WAF Web ACL for Cognito (us-east-1 only)'
    Value: !If [IsUSEast1, !Ref CognitoWAFWebACL, 'Not deployed - wrong region']
    Export:
      Name: !Sub '${StackPrefix}-cognito-waf-id'

  WAFWebACLArn:
    Description: 'ARN of the WAF Web ACL for Cognito (us-east-1 only)'
    Value: !If [IsUSEast1, !GetAtt CognitoWAFWebACL.Arn, 'Not deployed - wrong region']
    Export:
      Name: !Sub '${StackPrefix}-cognito-waf-arn'

  DeploymentRegion:
    Description: 'Region where this WAF template was deployed'
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${StackPrefix}-cognito-waf-region'
