AWSTemplateFormatVersion: '2010-09-09'
Description: 'SERA Route 53 Hosted Zone Configuration - Multi-Stack Support'

Parameters:
  StackPrefix:
    Type: String
    Description: 'Unique prefix for this SERA deployment (e.g., sera-prod, sera-dev, sera-partner1)'
    AllowedPattern: '^[a-z][a-z0-9-]{2,20}$'
    ConstraintDescription: 'Must be 3-21 characters, lowercase, start with letter, hyphens allowed'
    Default: 'sera'
    
  PublicReachableDomainName:
    Type: String
    Description: 'Primary domain name for SERA (e.g., projectsera.link)'
    Default: 'sera.example.com'

Resources:
  # Primary Domain Hosted Zone
  SeraHostedZone1:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref PublicReachableDomainName
      HostedZoneConfig:
        Comment: !Sub 'Hosted zone for ${StackPrefix} application - primary'
      HostedZoneTags:
        - Key: Name
          Value: !Sub '${StackPrefix}-primary-zone'
        - Key: Application
          Value: !Sub 'SERA-${StackPrefix}'
        - Key: StackPrefix
          Value: !Ref StackPrefix

Outputs:
  SeraHostedZoneId1:
    Description: 'ID of the primary Route 53 hosted zone'
    Value: !Ref SeraHostedZone1
    Export:
      Name: !Sub '${StackPrefix}-hosted-zone-id-1'
      
  SeraPublicReachableDomainName:
    Description: 'Primary domain name for SERA'
    Value: !Ref PublicReachableDomainName
    Export:
      Name: !Sub '${StackPrefix}-public-reachable-domain-name'

  SeraHostedZoneName:
    Description: 'Name of the primary Route 53 hosted zone'
    Value: !Ref PublicReachableDomainName
    Export:
      Name: !Sub '${StackPrefix}-hosted-zone-name'
