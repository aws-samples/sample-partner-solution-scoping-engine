AWSTemplateFormatVersion: '2010-09-09'
Description: 'SERA S3 Application Buckets and CloudFront Distribution - Multi-Stack Support'

Parameters:
  StackPrefix:
    Type: String
    Description: 'Unique prefix for this SERA deployment (e.g., sera-prod, sera-dev, sera-partner1)'
    AllowedPattern: '^[a-z][a-z0-9-]{2,20}$'
    ConstraintDescription: 'Must be 3-21 characters, lowercase, start with letter, hyphens allowed'
    Default: 'sera'

  CloudFrontPrivateKey:
    Type: String
    Description: 'CloudFront private key in PEM format'
    NoEcho: true
    MinLength: 1000
    MaxLength: 4096

  CloudFrontPublicKey:
    Type: String
    Description: 'CloudFront public key in PEM format'
    MinLength: 200
    MaxLength: 2048

Resources:
  # Store private key in Secrets Manager
  CloudFrontPrivateKeySecret:
    Type: AWS::SecretsManager::Secret
    Metadata:
      cdk_nag:
        rules_to_suppress:
          - id: AwsSolutions-SMG4
            reason: "CloudFront private keys require coordinated rotation with key groups and signed URLs. Automatic rotation would break active signed URLs."
    Properties:
      Name: !Sub '${StackPrefix}-cloudfront-private-key'
      Description: !Sub 'CloudFront private key for ${StackPrefix} signed URLs'
      SecretString: !Base64 
        Ref: CloudFrontPrivateKey
      KmsKeyId: !ImportValue
                Fn::Sub: '${StackPrefix}-kms-key-id'

  # CloudFront Public Key
  SeraCloudFrontPublicKey:
    Type: AWS::CloudFront::PublicKey
    Properties:
      PublicKeyConfig:
        Name: !Sub '${StackPrefix}-cloudfront-public-key'
        Comment: !Sub 'Public key for ${StackPrefix} CloudFront signed URLs'
        EncodedKey: !Sub "${CloudFrontPublicKey}"
        CallerReference: !Sub '${AWS::AccountId}-${StackPrefix}-public-key-${AWS::Region}'

  # CloudFront Key Group
  SeraCloudFrontKeyGroup:
    Type: AWS::CloudFront::KeyGroup
    Properties:
      KeyGroupConfig:
        Name: !Sub '${StackPrefix}-cloudfront-key-group'
        Comment: !Sub 'Key group for ${StackPrefix} CloudFront signed URLs'
        Items:
          - !Ref SeraCloudFrontPublicKey

  # CloudFront Access Logs Bucket
  CloudFrontAccessLogsBucket:
    Type: AWS::S3::Bucket
    Metadata:
      cdk_nag:
        rules_to_suppress:
          - id: AwsSolutions-S1
            reason: "This IS the access logging bucket for the distribution"
          - id: AwsSolutions-S2
            reason: "This is the required bucket ACL for logging CloudFront access"
      checkov:
        skip:
          - id: CKV_AWS_54
            comment: "BlockPublicPolicy must be false for CloudFront access logging to function properly. AWS CloudFront service requires this setting to write access logs."
          - id: CKV_AWS_18
            comment: "This IS the access logging bucket for CloudFront. Enabling S3 access logging on a logging bucket would create recursive logging loops."
          - id: CKV_AWS_56
            comment: "RestrictPublicBuckets must be false for CloudFront access logging to function properly. AWS CloudFront service requires this setting to write access logs."
    Properties:
      BucketName: !Sub '${StackPrefix}-cloudfront-access-logs-${AWS::AccountId}'
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerPreferred
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !ImportValue
                Fn::Sub: '${StackPrefix}-kms-key-id'
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: false  # Must be false for CloudFront logging
        IgnorePublicAcls: true
        RestrictPublicBuckets: false  # Must be false for CloudFront logging
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !ImportValue
                Fn::Sub: '${StackPrefix}-logfiles-bucket-name'
        LogFilePrefix: 'cloudfront-access-logs-bucket-access/'
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-cloudfront-access-logs'
        - Key: Application
          Value: !Sub 'SERA-${StackPrefix}'
        - Key: StackPrefix
          Value: !Ref StackPrefix

  # CloudFront Access Logs Bucket Policy
  CloudFrontAccessLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudFrontAccessLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSsl
            Effect: Deny
            Action: 's3:*'
            Resource: 
              - !GetAtt CloudFrontAccessLogsBucket.Arn
              - !Sub '${CloudFrontAccessLogsBucket.Arn}/*'
            Principal: '*'
            Condition: 
              Bool:
                aws:SecureTransport: 'false'
          - Sid: AllowCloudFrontLogging
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: 
              - s3:PutObject
              - s3:PutObjectAcl
            Resource: !Sub '${CloudFrontAccessLogsBucket.Arn}/access-logs/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SeraDocsCloudFrontDistribution}'

  # Chat documents bucket
  SeraChatDocsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${StackPrefix}-chat-docs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: !ImportValue
                Fn::Sub: '${StackPrefix}-kms-key-id'
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LoggingConfiguration:
        DestinationBucketName: !ImportValue
                Fn::Sub: '${StackPrefix}-logfiles-bucket-name'
        LogFilePrefix: 'chat-docs-access-logs/'
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - GET
              - HEAD
            AllowedOrigins:
              - '*'
            ExposedHeaders:
              - ETag
            MaxAge: 3000
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-chat-docs-bucket'
        - Key: Application
          Value: !Sub 'SERA-${StackPrefix}'
        - Key: Purpose
          Value: ChatDocuments
        - Key: StackPrefix
          Value: !Ref StackPrefix
  # Custom Cache Policy for S3 Versioning
  S3VersioningCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub '${StackPrefix}-S3-Versioning-Cache-Policy'
        Comment: !Sub 'Custom cache policy for ${StackPrefix} S3 objects with version IDs'
        DefaultTTL: 86400
        MaxTTL: 31536000
        MinTTL: 1
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingBrotli: true
          EnableAcceptEncodingGzip: true
          QueryStringsConfig:
            QueryStringBehavior: whitelist
            QueryStrings:
              - versionId
          HeadersConfig:
            HeaderBehavior: none
          CookiesConfig:
            CookieBehavior: none

  # CloudFront Origin Access Control
  SeraChatDocsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${StackPrefix}-oac'
        Description: !Sub 'Origin Access Control for ${StackPrefix} chat documents bucket'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Distribution
  SeraDocsCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Metadata:
      cdk_nag:
        rules_to_suppress:
          - id: AwsSolutions-CFR1
            reason: "Application uses Cognito authentication for access control and is only for downloading documents via PreSigned URLs"
          - id: AwsSolutions-CFR2
            reason: "Distribution serves static documents with signed URL access control. Shield Basic provides DDoS protection. WAF provides minimal additional security value for pre-authenticated static content distribution."
      checkov:
        skip:
          - id: CKV_AWS_68
            comment: "Distribution serves static documents with signed URL access control and Cognito authentication. WAF provides minimal additional security value for pre-authenticated static content distribution. Shield Basic provides DDoS protection."
    Properties:
      DistributionConfig:
        Comment: !Sub '${StackPrefix} document retrieval distribution'
        Aliases: 
          - !ImportValue
                Fn::Sub: '${StackPrefix}-cloudfront-domain-name'
        DefaultRootObject: ''
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: !Sub 'S3-${SeraChatDocsBucket}'
            DomainName: !GetAtt SeraChatDocsBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''
            OriginAccessControlId: !Ref SeraChatDocsOAC
        DefaultCacheBehavior:
          TargetOriginId: !Sub 'S3-${SeraChatDocsBucket}'
          ViewerProtocolPolicy: https-only
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: !Ref S3VersioningCachePolicy
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # Managed CORS-S3Origin policy
          ResponseHeadersPolicyId: 60669652-455b-4ae9-85a4-c4c02393f86c  # Managed SimpleCORS policy
          TrustedKeyGroups:
            - !Ref SeraCloudFrontKeyGroup
        Logging:
          Bucket: !GetAtt CloudFrontAccessLogsBucket.DomainName
          Prefix: 'access-logs/'
          IncludeCookies: false
        ViewerCertificate:
          AcmCertificateArn: !ImportValue
                Fn::Sub: '${StackPrefix}-cloudfront-certificate-arn-1'
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only
        Restrictions:
          GeoRestriction:
            RestrictionType: none
      Tags:
        - Key: Name
          Value: !Sub '${StackPrefix}-docs-retrieval'
        - Key: Application
          Value: !Sub 'SERA-${StackPrefix}'
        - Key: Purpose
          Value: DocumentRetrieval
        - Key: StackPrefix
          Value: !Ref StackPrefix

  # Route 53 record for CloudFront distribution
  CloudFrontDNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue
                Fn::Sub: '${StackPrefix}-hosted-zone-id-1'
      Name: !ImportValue
                Fn::Sub: '${StackPrefix}-cloudfront-domain-name'
      Type: A
      AliasTarget:
        DNSName: !GetAtt SeraDocsCloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2  # CloudFront hosted zone ID (this is a fixed value for all CloudFront distributions)
        EvaluateTargetHealth: false
        
  # S3 bucket policy with CloudFront access
  SeraChatDocsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SeraChatDocsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyNonSsl
            Effect: Deny
            Action: 
              - 's3:*'
            Resource: 
              - !Sub 'arn:aws:s3:::${SeraChatDocsBucket}'
              - !Sub 'arn:aws:s3:::${SeraChatDocsBucket}/*'
            Principal: '*'
            Condition: 
              Bool:
                aws:SecureTransport: 'false'
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource: !Sub 'arn:aws:s3:::${SeraChatDocsBucket}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${SeraDocsCloudFrontDistribution}'

Outputs:
  # S3 Chat Documents Bucket
  SeraChatDocsBucketName:
    Description: 'Name of the SERA chat documents bucket'
    Value: !Ref SeraChatDocsBucket
    Export:
      Name: !Sub '${StackPrefix}-chat-docs-bucket-name'

  SeraChatDocsBucketArn:
    Description: 'ARN of the SERA chat documents bucket'
    Value: !GetAtt SeraChatDocsBucket.Arn
    Export:
      Name: !Sub '${StackPrefix}-chat-docs-bucket-arn'

  SeraChatDocsBucketDomainName:
    Description: 'Domain name of the SERA chat documents bucket'
    Value: !GetAtt SeraChatDocsBucket.DomainName
    Export:
      Name: !Sub '${StackPrefix}-chat-docs-bucket-domain'

  # CloudFront Access Logs Bucket
  CloudFrontAccessLogsBucketName:
    Description: 'Name of the CloudFront access logs bucket'
    Value: !Ref CloudFrontAccessLogsBucket
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-access-logs-bucket-name'

  CloudFrontAccessLogsBucketArn:
    Description: 'ARN of the CloudFront access logs bucket'
    Value: !GetAtt CloudFrontAccessLogsBucket.Arn
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-access-logs-bucket-arn'

  # CloudFront Resources
  SeraChatDocsOACId:
    Description: 'ID of the SERA chat docs Origin Access Control'
    Value: !Ref SeraChatDocsOAC
    Export:
      Name: !Sub '${StackPrefix}-chat-docs-oac-id'

  SeraDocsCloudFrontDistributionId:
    Description: 'ID of the SERA docs CloudFront distribution'
    Value: !Ref SeraDocsCloudFrontDistribution
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-distribution-id'

  SeraDocsCloudFrontDistributionDomainName:
    Description: 'Domain name of the SERA docs CloudFront distribution'
    Value: !GetAtt SeraDocsCloudFrontDistribution.DomainName
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-distribution-domain'

  # CloudFront Security Resources
  CloudFrontPrivateKeySecretArn:
    Description: 'ARN of the Secrets Manager secret containing CloudFront private key'
    Value: !Ref CloudFrontPrivateKeySecret
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-private-key-secret-arn'

  CloudFrontPrivateKeySecretRegion:
    Description: 'Secrets Manager Region where the CloudFront Private Key Secret was created'
    Value: !Ref AWS::Region
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-private-key-secret-region'

  SeraCloudFrontPublicKeyId:
    Description: 'ID of the SERA CloudFront public key'
    Value: !Ref SeraCloudFrontPublicKey
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-public-key-id'

  SeraCloudFrontKeyGroupId:
    Description: 'ID of the SERA CloudFront key group'
    Value: !Ref SeraCloudFrontKeyGroup
    Export:
      Name: !Sub '${StackPrefix}-cloudfront-key-group-id'
